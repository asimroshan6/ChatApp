{% extends 'base.html' %}

{% block content %}
    <div class="container mt-4">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Anonymous Chat Room</h5>
            </div>

            <div id="chat-window" class="card-body bg-light" style="height: 400px; overflow-y: auto;">
                <div id="messages" class="d-flex flex-column align-items-start">
                    <div class="p-2 mb-2 bg-white border rounded shadow-sm" style="max-width: 80%;">
                        <strong>System:</strong> Welcome to the chat!
                    </div>
                </div>
            </div>

            <div class="card-footer">
                <input type="text" id="messageInput" class="form-control" placeholder="Type your message..." autocomplete="off">
                <button class="btn btn-primary mt-3" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const username = sessionStorage.getItem("username")
        if (!username){
            window.location.href="/";
            alert("User not found!");
        }
        const ws = new WebSocket(`ws://localhost:8000/message?username=${username}`);
        ws.onmessage = function(event){
            const div = document.createElement("div");
            div.className = "p-2 mb-2 bg-white border rounded shadow-sm";
            div.style.maxWidth = "80%";
            div.textContent = event.data;
            document.getElementById("messages").appendChild(div);
        }

        function sendMessage(){
            const input = document.getElementById("messageInput");
            ws.send(input.value);
            input.value = "";
        }
    </script>

{% endblock %}
