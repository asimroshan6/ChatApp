{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="text-center">

        <h1 class="mb-3 fw-bold">Anonymous Chat</h1>
        <p class="text-muted mb-4">Create or join a room and start chatting instantly</p>

        <div class="d-flex justify-content-center gap-3">
            <a href="{{ url_for('create-room') }}" class="btn btn-primary px-4">
                Create Room
            </a>

            <button class="btn btn-outline-primary px-4" data-bs-toggle="modal" data-bs-target="#usernameModal">
                Join Room
            </button>
        </div>

    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="usernameModal">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow">

            <div class="modal-header">
                <h5 class="modal-title">Join Room</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form id="loginForm">

                    <div class="mb-3">
                        <input type="text" class="form-control" id="roomName" placeholder="Room Name" required>
                    </div>

                    <div class="mb-3">
                        <input type="password" class="form-control" id="roomPassword" placeholder="Password" required>
                    </div>

                    <div class="mb-3">
                        <input type="text" class="form-control" id="username" placeholder="Username" required>
                    </div>

                </form>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button onclick="gotoChat()" class="btn btn-primary">Join</button>
            </div>

        </div>
    </div>
</div>

{% endblock %}
